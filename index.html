<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0f">
<title>Epicurean Kitchen Display</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #14141f;
  --surface-2: #1e1e2e;
  --border: #2a2a3a;
  --primary: #B87333;
  --primary-light: #D4956A;
  --success: #4ade80;
  --warning: #fb923c;
  --danger: #ef4444;
  --info: #60a5fa;
  --text: #f1f5f9;
  --text-sec: #94a3b8;
  --text-muted: #64748b;
  --radius: 12px;
  --font: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --ease: cubic-bezier(0.23, 1, 0.32, 1);
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow:hidden; }
body { font-family:var(--font); color:var(--text); background:var(--bg); -webkit-font-smoothing:antialiased; }

.kds-app { display:flex; flex-direction:column; height:100vh; }

.kds-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:0.8rem 1.5rem; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0;
}
.kds-header h1 { font-size:1.1rem; font-weight:700; color:var(--primary-light); }
.kds-header .clock { font-family:var(--font-mono); font-size:1rem; color:var(--text-sec); }
.kds-header .order-count { font-size:0.8rem; color:var(--text-muted); }

.station-tabs {
  display:flex; gap:0; overflow-x:auto; background:var(--surface);
  border-bottom:1px solid var(--border); flex-shrink:0; scrollbar-width:none;
}
.station-tabs::-webkit-scrollbar { display:none; }
.station-tab {
  padding:0.6rem 1.2rem; font-size:0.75rem; font-weight:600; white-space:nowrap;
  color:var(--text-muted); border-bottom:2px solid transparent; cursor:pointer;
  text-transform:uppercase; letter-spacing:0.05em; transition:all 0.16s var(--ease);
}
.station-tab.active { color:var(--primary-light); border-bottom-color:var(--primary); }
.station-tab .tab-count {
  display:inline-block; background:var(--danger); color:#fff; font-size:0.6rem;
  width:16px; height:16px; border-radius:50%; text-align:center; line-height:16px;
  margin-left:0.3rem;
}

.kds-content { flex:1; overflow-y:auto; padding:1rem; }

.order-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:1rem; }

.order-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  overflow:hidden; transition:all 0.2s var(--ease);
}
.order-card.urgent { border-color:var(--danger); }
.order-card .card-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:0.8rem 1rem; background:var(--surface-2); border-bottom:1px solid var(--border);
}
.order-card .table-badge {
  font-family:var(--font-mono); font-size:1.2rem; font-weight:700; color:var(--primary-light);
}
.order-card .server-name { font-size:0.75rem; color:var(--text-muted); }
.order-card .timer {
  font-family:var(--font-mono); font-size:0.9rem; font-weight:600;
  padding:0.2rem 0.6rem; border-radius:6px; background:rgba(74,222,128,0.1); color:var(--success);
}
.order-card .timer.warn { background:rgba(251,146,60,0.1); color:var(--warning); }
.order-card .timer.critical { background:rgba(239,68,68,0.1); color:var(--danger); animation:blink 1s infinite; }
@keyframes blink { 50%{opacity:0.5} }

.order-card .card-items { padding:0.8rem 1rem; }
.order-item {
  display:flex; align-items:center; justify-content:space-between;
  padding:0.5rem 0; border-bottom:1px solid var(--border);
}
.order-item:last-child { border-bottom:none; }
.order-item .item-name { font-size:0.85rem; font-weight:500; }
.order-item .item-mod { font-size:0.7rem; color:var(--warning); margin-top:0.1rem; }
.order-item .item-time { font-size:0.7rem; color:var(--text-muted); font-family:var(--font-mono); }

.order-card .card-footer { padding:0.6rem 1rem; border-top:1px solid var(--border); }
.bump-btn {
  width:100%; padding:0.7rem; border:none; border-radius:8px;
  background:var(--success); color:var(--bg); font-size:0.85rem; font-weight:700;
  cursor:pointer; text-transform:uppercase; letter-spacing:0.05em;
  transition:all 0.12s var(--ease);
}
.bump-btn:active { transform:scale(0.96); }

/* Empty state */
.empty-state { text-align:center; padding:4rem 2rem; color:var(--text-muted); }
.empty-state .icon { font-size:3rem; margin-bottom:1rem; opacity:0.5; }

/* Login overlay */
.login-overlay {
  position:fixed; inset:0; background:var(--bg); display:flex;
  align-items:center; justify-content:center; z-index:100; text-align:center;
}
.login-overlay h1 { font-size:1.5rem; margin-bottom:0.3rem; }
.login-overlay .sub { color:var(--primary-light); font-size:0.85rem; margin-bottom:2rem; }
.login-overlay .pin-row { display:flex; gap:8px; justify-content:center; margin-bottom:1.5rem; }
.login-overlay .pin-d { width:14px; height:14px; border-radius:50%; background:var(--border); transition:all 0.16s; }
.login-overlay .pin-d.on { background:var(--primary); box-shadow:0 0 8px rgba(184,115,51,0.5); }
.login-overlay .numgrid { display:grid; grid-template-columns:repeat(3,60px); gap:10px; justify-content:center; }
.login-overlay .nbtn {
  width:60px; height:60px; border-radius:50%; border:1px solid var(--border);
  background:var(--surface); color:var(--text); font-size:1.3rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all 0.12s var(--ease);
}
.login-overlay .nbtn:active { transform:scale(0.9); background:var(--primary-glow); }
.login-overlay .nbtn.act { font-size:0.8rem; color:var(--text-sec); }
#kds-pin-error { color:var(--danger); font-size:0.8rem; margin-top:0.8rem; min-height:1.2rem; }

@media (max-width:768px) { .order-grid { grid-template-columns:1fr; } }
@media (min-width:1400px) { .order-grid { grid-template-columns:repeat(4,1fr); } }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="kds-login">
  <div>
    <h1>Kitchen Display</h1>
    <p class="sub">Enter kitchen code</p>
    <div class="pin-row" id="kds-pin-dots">
      <div class="pin-d"></div><div class="pin-d"></div><div class="pin-d"></div><div class="pin-d"></div>
    </div>
    <div class="numgrid" id="kds-numpad"></div>
    <p id="kds-pin-error"></p>
  </div>
</div>

<!-- KDS APP -->
<div class="kds-app" id="kds-app" style="display:none;">
  <div class="kds-header">
    <h1>🔥 Kitchen Display</h1>
    <span class="order-count" id="kds-order-count">0 active orders</span>
    <span class="clock" id="kds-clock">00:00</span>
  </div>
  <div class="station-tabs" id="station-tabs"></div>
  <div class="kds-content" id="kds-content"></div>
</div>

<script>
// ─── Firebase ───────────────────────────────────────────────────
var firebaseConfig = {
  apiKey: "AIzaSyAvg9x8kmKmZjcu62D2Jb4jpO57ArC657Y",
  authDomain: "epicurean-house-at-the-choc-st.firebaseapp.com",
  projectId: "epicurean-house-at-the-choc-st",
  storageBucket: "epicurean-house-at-the-choc-st.firebasestorage.app",
  messagingSenderId: "320703681087",
  appId: "1:320703681087:web:04f7c9a17637388a039e8a"
};
var fbApp=null, fbDb=null, fbReady=false;
try { fbApp=firebase.initializeApp(firebaseConfig); fbDb=firebase.firestore(); fbReady=true; } catch(e){ console.warn('Firebase:',e); }

// ─── State ──────────────────────────────────────────────────────
var STATE = { orders:[], station:'All' };
var STATIONS = ['All','Grill','Sauté','Fry','Cold/Garde Manger','Pastry','Bar','Expo'];
var KITCHEN_CODES = ['1001','5001','EPICUREAN2024']; // kitchen + manager + owner

// ─── Login ──────────────────────────────────────────────────────
var kdsPin='';
function buildKdsNumpad() {
  var pad=document.getElementById('kds-numpad');
  [1,2,3,4,5,6,7,8,9,'⌫',0,'→'].forEach(k=>{
    var btn=document.createElement('button');
    btn.className='nbtn'+(typeof k==='string'?' act':'');
    btn.textContent=k;
    btn.onclick=()=>kdsKey(k);
    pad.appendChild(btn);
  });
}
function kdsKey(k) {
  if (k==='⌫') kdsPin=kdsPin.slice(0,-1);
  else if (k==='→') kdsAttempt();
  else if (kdsPin.length<20) kdsPin+=k;
  document.querySelectorAll('#kds-pin-dots .pin-d').forEach((d,i)=>d.classList.toggle('on',i<Math.min(kdsPin.length,4)));
  if (kdsPin.length===4) setTimeout(kdsAttempt,200);
}
function kdsAttempt() {
  if (KITCHEN_CODES.includes(kdsPin)) {
    document.getElementById('kds-login').style.display='none';
    document.getElementById('kds-app').style.display='flex';
    startKDS();
  } else {
    document.getElementById('kds-pin-error').textContent='Invalid code';
    kdsPin='';
    document.querySelectorAll('#kds-pin-dots .pin-d').forEach(d=>d.classList.remove('on'));
  }
}

// ─── KDS ────────────────────────────────────────────────────────
function startKDS() {
  renderStationTabs();
  loadOrders();
  setInterval(updateTimers,1000);
  updateClock();
  setInterval(updateClock,1000);
}

function renderStationTabs() {
  var tabs=document.getElementById('station-tabs');
  tabs.innerHTML=STATIONS.map(s=>{
    var count=s==='All'?STATE.orders.length:STATE.orders.filter(o=>o.items&&o.items.some(i=>i.station===s)).length;
    return '<div class="station-tab'+(s===STATE.station?' active':'')+'" onclick="setStation(\''+s+'\')">'+s+
      (count?'<span class="tab-count">'+count+'</span>':'')+
    '</div>';
  }).join('');
}

function setStation(s) { STATE.station=s; renderStationTabs(); renderOrders(); }

function loadOrders() {
  if (!fbReady) return;
  fbDb.collection('orders').where('status','==','new').onSnapshot(snap=>{
    STATE.orders=[];
    snap.forEach(d=>STATE.orders.push({id:d.id,...d.data()}));
    STATE.orders.sort((a,b)=>a.sentAt-b.sentAt);
    renderStationTabs();
    renderOrders();
    document.getElementById('kds-order-count').textContent=STATE.orders.length+' active order'+(STATE.orders.length===1?'':'s');
  });
}

function renderOrders() {
  var c=document.getElementById('kds-content');
  var orders=STATE.orders;
  if (STATE.station!=='All') {
    orders=orders.filter(o=>o.items&&o.items.some(i=>i.station===STATE.station));
  }
  if (!orders.length) {
    c.innerHTML='<div class="empty-state"><div class="icon">✓</div><p>All clear — no active orders</p></div>';
    return;
  }
  c.innerHTML='<div class="order-grid">'+orders.map(o=>{
    var elapsed=Math.round((Date.now()-o.sentAt)/1000);
    var mins=Math.floor(elapsed/60); var secs=elapsed%60;
    var timerCls=mins>=15?'critical':mins>=10?'warn':'';
    var urgent=mins>=15;
    var items=(o.items||[]);
    if (STATE.station!=='All') items=items.filter(i=>i.station===STATE.station);
    return '<div class="order-card'+(urgent?' urgent':'')+'">'+
      '<div class="card-header">'+
        '<div><span class="table-badge">T'+o.table+'</span> <span class="server-name">'+o.server+'</span></div>'+
        '<span class="timer '+timerCls+'" data-sent="'+o.sentAt+'">'+pad(mins)+':'+pad(secs)+'</span>'+
      '</div>'+
      '<div class="card-items">'+items.map(i=>
        '<div class="order-item"><div><div class="item-name">'+i.name+'</div>'+
        (i.selectedMod?'<div class="item-mod">'+i.selectedMod+'</div>':'')+
        '</div><div class="item-time">'+i.cookTime+'m</div></div>'
      ).join('')+'</div>'+
      '<div class="card-footer"><button class="bump-btn" onclick="bumpOrder(\''+o.id+'\')">BUMP ✓</button></div>'+
    '</div>';
  }).join('')+'</div>';
}

function bumpOrder(orderId) {
  if (fbReady) {
    fbDb.collection('orders').doc(orderId).update({status:'cleared',clearedAt:Date.now()});
  }
  STATE.orders=STATE.orders.filter(o=>o.id!==orderId);
  renderStationTabs();
  renderOrders();
}

function updateTimers() {
  document.querySelectorAll('.timer[data-sent]').forEach(el=>{
    var sent=parseInt(el.dataset.sent);
    var elapsed=Math.round((Date.now()-sent)/1000);
    var mins=Math.floor(elapsed/60); var secs=elapsed%60;
    el.textContent=pad(mins)+':'+pad(secs);
    el.className='timer'+(mins>=15?' critical':mins>=10?' warn':'');
  });
}

function updateClock() {
  var now=new Date();
  document.getElementById('kds-clock').textContent=pad(now.getHours())+':'+pad(now.getMinutes());
}
function pad(n) { return n<10?'0'+n:n; }

// ─── Init ───────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', ()=>{ buildKdsNumpad(); });
</script>
</body>
</html>
